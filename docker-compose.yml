services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
    volumes:
      - ./config.json:/app/config.json:ro
      - metadata_data:/data/metadata
      # Uncomment to mount a NAS share (mount it on the host first via /etc/fstab):
      # - /mnt/nas:/mnt/nas:ro
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_URL=${APP_URL}

volumes:
  metadata_data:
  caddy_data:
  caddy_config:
