<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Library — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    h1 { font-size: 1.5rem; margin: 0; text-align: center; }
    .subtitle { color: #999; text-align: center; font-size: 0.9rem; margin: 0; }
    .btn {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #4f80ff; color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { opacity: 0.88; }
    .btn-secondary { background: #2a2a2a; color: #e8e8e8; border: 1px solid #444; }
    .btn-secondary:not(:disabled):hover { background: #333; }
    .status {
      text-align: center;
      font-size: 0.88rem;
      min-height: 1.2em;
      color: #aaa;
    }
    .status.error { color: #f87171; }
    .status.success { color: #4ade80; }
    details { border-top: 1px solid #2a2a2a; padding-top: 1rem; }
    summary { cursor: pointer; color: #888; font-size: 0.85rem; }
    .reg-fields { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.75rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.95rem;
    }
    input[type="text"]:focus { outline: none; border-color: #4f80ff; }
    label { font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <h1>PDF Library</h1>
  <p class="subtitle">Sign in with your passkey</p>

  <button id="btn-login" class="btn btn-primary">Sign in with passkey</button>
  <div id="status" class="status"></div>

  <details id="reg-section">
    <summary>Register a new device</summary>
    <div class="reg-fields">
      <div>
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="e.g. werner" autocomplete="username" />
      </div>
      <div>
        <label for="reg-displayname">Display name</label>
        <input type="text" id="reg-displayname" placeholder="e.g. Werner" autocomplete="name" />
      </div>
      <button id="btn-register" class="btn btn-secondary">Register this device</button>
    </div>
  </details>
</div>

<script src="/login.js"></script>
</body>
</html>
